apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  interval: 1h
  chart:
    spec:
      chart: actualbudget
      version: "1.8.7"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: actual-budget

  values:
    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        cert-manager.io/cluster-issuer: internal-ca
        gethomepage.dev/enabled: "true"
        gethomepage.dev/description: Actual Budget
        gethomepage.dev/group: Finance
        gethomepage.dev/name: "Actual Budget"
        gethomepage.dev/icon: "https://actualbudget.org/img/actual.png"
      hosts:
        - host: finances.internal
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - finances.internal
          secretName: actual-budget-tls

    persistence:
      enabled: true
      storageClass: nfs-client
      accessModes:
        - ReadWriteOnce
      size: 10Gi
