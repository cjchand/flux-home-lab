apiVersion: v1
kind: ConfigMap
metadata:
  name: unifi-mongodb-init
  namespace: unifi
data:
  init-unifi.sh: |
    #!/bin/bash
    set -e
    DECODED_PASS=$(printf "%b" "${MONGO_USER_PASSWORD//%/\\x}")
    mongosh admin \
      -u "$MONGO_INITDB_ROOT_USERNAME" \
      -p "$MONGO_INITDB_ROOT_PASSWORD" \
      --eval "
        db = db.getSiblingDB('unifi');
        db.createUser({
          user: 'unifi',
          pwd: '$DECODED_PASS',
          roles: [
            { role: 'dbOwner', db: 'unifi' },
            { role: 'dbOwner', db: 'unifi_stat' },
            { role: 'dbOwner', db: 'unifi_audit' }
          ]
        });
      "
