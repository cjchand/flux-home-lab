# WARNING: This file contains a plaintext placeholder secret.
# DO NOT COMMIT this file as-is. Follow these steps before deploying:
#
#   1. Replace the base64-encoded value below with your actual camera password:
#        echo -n 'your-camera-password' | base64
#
#   2. Seal this secret with kubeseal so it is safe to commit:
#        kubeseal --fetch-cert --controller-name=sealed-secrets \
#          --controller-namespace=kube-system > pub-cert.pem
#        kubeseal --cert=pub-cert.pem --format=yaml < secret-frigate.yaml \
#          > sealed-secret-frigate.yaml
#
#   3. Commit sealed-secret-frigate.yaml (not this file).
#      Add secret-frigate.yaml to .gitignore.
#
#   4. Update kustomization.yaml to reference sealed-secret-frigate.yaml
#      instead of secret-frigate.yaml.
#
# SECURITY NOTE: The Frigate config is a ConfigMap (not a Secret), so camera
# credentials are only as protected as RBAC allows within the cluster. The
# CAMERA_PASSWORD env var pattern keeps the credential out of git while still
# making it available to the Frigate process via environment variable substitution
# in config.yml (${CAMERA_PASSWORD}).
apiVersion: v1
kind: Secret
metadata:
  name: frigate-credentials
  namespace: frigate
type: Opaque
data:
  # base64-encoded camera password — replace before deploying
  CAMERA_PASSWORD: Y0hBTkdFTUU=
