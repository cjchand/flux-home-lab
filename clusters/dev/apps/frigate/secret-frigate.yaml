# WARNING: This file contains a plaintext placeholder secret.
# DO NOT COMMIT this file as-is. Follow these steps before deploying:
#
#   1. Replace the FRIGATE_RTSP_PASSWORD value below with your actual camera password
#
#   2. Seal this secret with kubeseal so it is safe to commit:
#        kubeseal --fetch-cert --controller-name=sealed-secrets \
#          --controller-namespace=kube-system > pub-cert.pem
#        kubeseal --cert=pub-cert.pem --format=yaml < secret-frigate.yaml \
#          > sealed-secret-frigate.yaml
#
#   3. Commit sealed-secret-frigate.yaml (not this file).
#      Add secret-frigate.yaml to .gitignore.
#
#   4. Update kustomization.yaml to reference sealed-secret-frigate.yaml
#      instead of secret-frigate.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: frigate-credentials
  namespace: frigate
type: Opaque
stringData:
  # Plaintext camera password — Kubernetes encodes it; replace before deploying
  FRIGATE_RTSP_PASSWORD: CHANGEME
