apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-config
  namespace: frigate
data:
  config.yml: |
    mqtt:
      enabled: true
      host: mosquitto.mqtt.svc.cluster.local
      port: 1883

    detectors:
      # CPU-only inference — Intel GPUs on these nodes are too underpowered for Frigate.
      # Tune num_threads based on observed CPU usage; 3 is a reasonable starting point
      # for 3–5 cameras at 5 FPS each.
      cpu1:
        type: cpu
        num_threads: 3

    # HTTP-FLV is used instead of raw RTSP — Reolink's RTSP implementation has known
    # instability in Frigate. See: https://docs.frigate.video/configuration/camera_specific/
    # Enable HTTP on each camera: Reolink app → Camera Settings → Network → Advanced → HTTP
    # Do NOT auto-update Reolink firmware once working: https://github.com/AT0myks/reolink-fw-archive
    # Reolink E1 Pro is a WiFi camera — it does not support the bcs HTTP-FLV stream
    # format used by Reolink NVR/PoE cameras. Use plain RTSP instead.
    go2rtc:
      streams:
        camera_kitchen:
          - "rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.86.37:554/h264Preview_01_main"
        camera_kitchen_sub:
          - "rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.86.37:554/h264Preview_01_sub"

        # Add additional cameras by duplicating the blocks above:
        # camera_living_room:
        #   - "rtsp://admin:{FRIGATE_RTSP_PASSWORD}@CAMERA_IP:554/h264Preview_01_main"
        # camera_living_room_sub:
        #   - "rtsp://admin:{FRIGATE_RTSP_PASSWORD}@CAMERA_IP:554/h264Preview_01_sub"

    cameras:
      camera_kitchen:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/camera_kitchen
              input_args: preset-rtsp-restream
              roles:
                - record
            - path: rtsp://127.0.0.1:8554/camera_kitchen_sub
              input_args: preset-rtsp-restream
              roles:
                - detect
        detect:
          width: 640
          height: 480
          # 5 FPS is sufficient for person detection and saves significant CPU.
          fps: 5
        objects:
          track:
            - person
        record:
          enabled: true
        snapshots:
          enabled: true

      # Add cameras by duplicating the block above. Name must match the go2rtc stream name.

    birdseye:
      enabled: true
      # motion: only shows cameras with recent motion — saves resources
      mode: motion

    # Recordings are stored under /media/frigate, which is mounted from the NFS PVC.
    # Storage math: ~5–8 GB/camera/day at motion-only mode.
    # 7-day retain on 3 cameras ≈ 120–170 GB. Size the NAS share accordingly.
    record:
      enabled: true
      motion:
        days: 7
      alerts:
        retain:
          days: 14
          mode: motion
      detections:
        retain:
          days: 14
          mode: motion

    snapshots:
      retain:
        default: 14
