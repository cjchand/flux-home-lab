# Static NFS PersistentVolume for Frigate recordings.
# BEFORE DEPLOYING: replace NAS_IP and NAS_NFS_PATH with actual values.
#
# Storage sizing guidance:
#   ~5–8 GB/camera/day at motion-only record mode
#   ~10–15 GB/camera/day for continuous recording
#   7-day retain × 5 cameras × 8 GB/day ≈ 280 GB minimum
#   2Ti provides comfortable headroom for 5 cameras over 7–14 day retention.
#   Adjust to match your NAS share size.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: frigate-recordings
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: NAS_IP          # PLACEHOLDER — replace with Synology NAS IP
    path: /NAS_NFS_PATH     # PLACEHOLDER — replace with NFS export path (e.g. /volume1/frigate)
  claimRef:
    namespace: frigate
    name: frigate-recordings
