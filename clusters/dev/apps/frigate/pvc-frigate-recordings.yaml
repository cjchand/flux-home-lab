apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-recordings
  namespace: frigate
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      # ~5–8 GB/camera/day at motion-only mode; 7-day retain × 3 cameras ≈ 160 GB minimum.
      storage: 200Gi
